apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: localrag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: localrag-frontend:dev
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: localrag-config
          ports:
            - name: http
              containerPort: 5173
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: localrag
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 5173
      targetPort: http

